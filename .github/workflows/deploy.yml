name: Deploy to cPanel

on:
  push:
    branches:
      - main
      - dev

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, bcmath
          coverage: none

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: 📦 Install NPM dependencies
        run: npm install

      - name: 🏗️ Build assets
        run: npm run build

      - name: 🚀 Generar archivo .env
        env:
          APP_KEY: ${{ secrets.APP_KEY }}
        run: |
          # Determinar valores por rama
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            APP_ENV="production"
            APP_DEBUG="false"
            APP_URL="https://api.vitarecord.com"
            SANCTUM_DOMAINS="app.vitarecord.com"
            CORS_ORIGINS="https://app.vitarecord.com"
          else
            APP_ENV="development"
            APP_DEBUG="true"
            APP_URL="https://dev.api.vitarecord.com"
            SANCTUM_DOMAINS="dev.app.vitarecord.com"
            CORS_ORIGINS="https://dev.app.vitarecord.com"
          fi

          # Generar archivo con el orden exacto pedido
          cat <<EOF > .env
APP_NAME=Laravel
APP_KEY=${APP_KEY:-base64:NCaT68na3uPjpZA+HjECSm7GFRROObiHEMwToMSV96Q=}
DB_DATABASE=
DB_USERNAME=
DB_PASSWORD=
APP_ENV=\$APP_ENV
APP_DEBUG=\$APP_DEBUG
APP_URL=\$APP_URL
SANCTUM_STATEFUL_DOMAINS=\$SANCTUM_DOMAINS
CORS_ALLOWED_ORIGINS=\$CORS_ORIGINS

APP_LOCALE=en
APP_FALLBACK_LOCALE=en
APP_FAKER_LOCALE=en_US

APP_MAINTENANCE_DRIVER=file
# APP_MAINTENANCE_STORE=database

# PHP_CLI_SERVER_WORKERS=4

BCRYPT_ROUNDS=12

LOG_CHANNEL=stack
LOG_STACK=single
LOG_DEPRECATIONS_CHANNEL=null
LOG_LEVEL=debug

DB_CONNECTION=sqlite
DB_DATABASE=/home/httpddfs/api.vitarecord.com/database/database.sqlite
# DB_HOST=127.0.0.1
# DB_PORT=3306
# DB_DATABASE=laravel
# DB_USERNAME=root
# DB_PASSWORD=

SESSION_DRIVER=database
SESSION_LIFETIME=120
SESSION_ENCRYPT=false
SESSION_PATH=/
SESSION_DOMAIN=null

BROADCAST_CONNECTION=log
FILESYSTEM_DISK=local
QUEUE_CONNECTION=database

CACHE_STORE=database
# CACHE_PREFIX=

MEMCACHED_HOST=127.0.0.1

REDIS_CLIENT=phpredis
REDIS_HOST=127.0.0.1
REDIS_PASSWORD=null
REDIS_PORT=6379

MAIL_MAILER=log
MAIL_SCHEME=null
MAIL_HOST=127.0.0.1
MAIL_PORT=2525
MAIL_USERNAME=null
MAIL_PASSWORD=null
MAIL_FROM_ADDRESS="hello@example.com"
MAIL_FROM_NAME="\${APP_NAME}"

AWS_ACCESS_KEY_ID=
AWS_SECRET_ACCESS_KEY=
AWS_DEFAULT_REGION=us-east-1
AWS_BUCKET=
AWS_USE_PATH_STYLE_ENDPOINT=false

VITE_APP_NAME="\${APP_NAME}"
EOF
          
          # Eliminar .env de .gitignore temporalmente para el despliegue
          sed -i '/^\.env$/d' .gitignore

      - name: 📂 Sync files (Production)
        if: github.ref == 'refs/heads/main'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /api.vitarecord.com/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
            **/storage/logs/*
            **/storage/framework/sessions/*
            **/storage/framework/views/*
            **/storage/framework/cache/data/*

      - name: 📂 Sync files (Development)
        if: github.ref == 'refs/heads/dev' 
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /dev.api.vitarecord.com/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
            **/storage/logs/*
            **/storage/framework/sessions/*
            **/storage/framework/views/*
            **/storage/framework/cache/data/*
