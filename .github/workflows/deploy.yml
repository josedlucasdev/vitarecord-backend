name: Deploy to cPanel

on:
  push:
    branches:
      - main
      - dev

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, bcmath
          coverage: none

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: 📦 Install NPM dependencies
        run: npm ci

      - name: 🚀 Generar archivo .env
        run: |
          cp .env.example .env
          sed -i "s|APP_KEY=|APP_KEY=${{ secrets.APP_KEY }}|g" .env
          sed -i "s|DB_DATABASE=laravel|DB_DATABASE=${{ secrets.DB_DATABASE }}|g" .env
          sed -i "s|# DB_USERNAME=root|DB_USERNAME=${{ secrets.DB_USERNAME }}|g" .env
          sed -i "s|# DB_PASSWORD=|DB_PASSWORD=${{ secrets.DB_PASSWORD }}|g" .env
          
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            sed -i "s|APP_ENV=local|APP_ENV=production|g" .env
            sed -i "s|APP_DEBUG=true|APP_DEBUG=false|g" .env
            sed -i "s|APP_URL=http://localhost|APP_URL=https://api.vitarecord.com|g" .env
            echo "SANCTUM_STATEFUL_DOMAINS=app.vitarecord.com" >> .env
            echo "CORS_ALLOWED_ORIGINS=https://app.vitarecord.com" >> .env
          else
            sed -i "s|APP_ENV=local|APP_ENV=development|g" .env
            sed -i "s|APP_DEBUG=true|APP_DEBUG=true|g" .env
            sed -i "s|APP_URL=http://localhost|APP_URL=https://dev.api.vitarecord.com|g" .env
            echo "SANCTUM_STATEFUL_DOMAINS=dev.app.vitarecord.com" >> .env
            echo "CORS_ALLOWED_ORIGINS=https://dev.app.vitarecord.com" >> .env
          fi

      - name: 📂 Sync files (Production)
        if: github.ref == 'refs/heads/main'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /api.vitarecord.com/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
            **/storage/logs/*
            **/storage/framework/sessions/*
            **/storage/framework/views/*
            **/storage/framework/cache/data/*

      - name: 📂 Sync files (Development)
        if: github.ref == 'refs/heads/dev' 
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /dev.api.vitarecord.com/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
            **/storage/logs/*
            **/storage/framework/sessions/*
            **/storage/framework/views/*
            **/storage/framework/cache/data/*
