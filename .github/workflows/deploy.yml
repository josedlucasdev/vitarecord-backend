name: Deploy to cPanel

on:
  push:
    branches:
      - main
      - dev

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, bcmath
          coverage: none

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: 📦 Install NPM dependencies
        run: npm install

      - name: 🏗️ Build assets
        run: npm run build

      - name: 🚀 Generar archivo .env
        env:
          APP_KEY: ${{ secrets.APP_KEY }}
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          cp .env.example .env
          
          # Eliminar líneas conflictivas para evitar duplicados
          sed -i '/^APP_KEY=/d; /^APP_URL=/d; /^APP_ENV=/d; /^APP_DEBUG=/d; /^DB_DATABASE=/d; /^DB_USERNAME=/d; /^DB_PASSWORD=/d' .env
          
          # Inyectar valores usando las variables de entorno de forma segura
          echo "APP_KEY=$APP_KEY" >> .env
          echo "DB_DATABASE=$DB_DATABASE" >> .env
          echo "DB_USERNAME=$DB_USERNAME" >> .env
          echo "DB_PASSWORD=$DB_PASSWORD" >> .env
          
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "APP_ENV=production" >> .env
            echo "APP_DEBUG=false" >> .env
            echo "APP_URL=https://api.vitarecord.com" >> .env
            echo "SANCTUM_STATEFUL_DOMAINS=app.vitarecord.com" >> .env
            echo "CORS_ALLOWED_ORIGINS=https://app.vitarecord.com" >> .env
          else
            echo "APP_ENV=development" >> .env
            echo "APP_DEBUG=true" >> .env
            echo "APP_URL=https://dev.api.vitarecord.com" >> .env
            echo "SANCTUM_STATEFUL_DOMAINS=dev.app.vitarecord.com" >> .env
            echo "CORS_ALLOWED_ORIGINS=https://dev.app.vitarecord.com" >> .env
          fi
          
          # Validación de seguridad
          if [ -z "$APP_KEY" ] || grep -q "APP_KEY=$" .env; then 
            echo "❌ ERROR: El secreto APP_KEY está VACÍO"; 
            exit 1; 
          fi
          
          sed -i '/^\.env$/d' .gitignore

      - name: 📂 Sync files (Production)
        if: github.ref == 'refs/heads/main'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /api.vitarecord.com/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
            **/storage/logs/*
            **/storage/framework/sessions/*
            **/storage/framework/views/*
            **/storage/framework/cache/data/*

      - name: 📂 Sync files (Development)
        if: github.ref == 'refs/heads/dev' 
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /dev.api.vitarecord.com/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
            **/storage/logs/*
            **/storage/framework/sessions/*
            **/storage/framework/views/*
            **/storage/framework/cache/data/*
