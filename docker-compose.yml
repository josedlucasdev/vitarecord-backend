services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medical-history-backend
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./database:/var/www/html/database
      - ./storage:/var/www/html/storage
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
    networks:
      - medical-network

networks:
  medical-network:
    driver: bridge
